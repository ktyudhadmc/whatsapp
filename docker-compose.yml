services:
  bot:
    build: .
    container_name: ${APP_NAME:-hono-bot-wa}
    ports:
      - "${PORT:-1997}:${PORT:-1997}"
    env_file:
      - .env
    volumes:
      - /opt/wa-auth:/app/.wwebjs_auth
      - /opt/wa-cache:/app/.wwebjs_cache
    shm_size: "1gb"
    init: true
    restart: unless-stopped 
    command: bun run start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-1997}/health"]
      interval: 30s
      timeout: 10s
      retries: 3