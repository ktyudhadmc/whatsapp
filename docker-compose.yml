services:
  bot:
    build: .
    container_name: ${APP_NAME:-chatbot.peternak.id}
    ports:
      - "127.0.0.1:${PORT:-2991}:${PORT:-2991}"
    env_file:
      - .env
    volumes:
      - /opt/wa-auth:/app/.wwebjs_auth
      - /opt/wa-cache:/app/.wwebjs_cache
      - /usr/bin/chromium-browser:/usr/bin/chromium-browser
      - /usr/lib/chromium-browser:/usr/lib/chromium-browser
    shm_size: "1gb"
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${PORT:-2991}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
